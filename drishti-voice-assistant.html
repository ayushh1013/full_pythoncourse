<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drishti - Voice Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background particles */
        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(99, 102, 241, 0.3);
            animation: float 20s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) translateX(100px); opacity: 0; }
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            max-width: 600px;
            width: 90%;
        }

        h1 {
            font-size: 3em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(102, 126, 234, 0.5)); }
            50% { filter: drop-shadow(0 0 20px rgba(118, 75, 162, 0.8)); }
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
            font-size: 1.1em;
        }

        .orb-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 40px;
        }

        .orb {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 0 60px rgba(102, 126, 234, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .orb::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .orb.listening {
            animation: listening 1.5s ease-in-out infinite;
            box-shadow: 0 0 100px rgba(102, 126, 234, 1);
        }

        @keyframes listening {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .orb svg {
            width: 80px;
            height: 80px;
            fill: white;
            z-index: 1;
        }

        .controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 30px;
        }

        button {
            padding: 15px 30px;
            font-size: 1.1em;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .api-input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            color: white;
            font-size: 1em;
            backdrop-filter: blur(10px);
        }

        .api-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .status {
            color: rgba(255, 255, 255, 0.8);
            margin-top: 20px;
            font-size: 1.1em;
            min-height: 30px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .transcript {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-height: 200px;
            overflow-y: auto;
            text-align: left;
        }

        .transcript-item {
            margin-bottom: 15px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .user-text {
            color: #667eea;
            font-weight: 600;
        }

        .assistant-text {
            color: rgba(255, 255, 255, 0.9);
            margin-top: 5px;
        }

        .warning {
            color: #ff6b6b;
            font-size: 0.9em;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <!-- Animated particles -->
    <script>
        for(let i = 0; i < 15; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.width = Math.random() * 10 + 5 + 'px';
            particle.style.height = particle.style.width;
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 20 + 's';
            particle.style.animationDuration = (Math.random() * 10 + 15) + 's';
            document.body.appendChild(particle);
        }
    </script>

    <div class="container">
        <h1>DRISHTI</h1>
        <p class="subtitle">Your Cinematic Voice Assistant</p>

        <input type="password" 
               class="api-input" 
               id="apiKey" 
               placeholder="Enter your OpenAI API Key">
        
        <div class="orb-container">
            <div class="orb" id="orb">
                <svg viewBox="0 0 24 24">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                    <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
            </div>
        </div>

        <div class="controls">
            <button id="startBtn">Start Listening</button>
            <button id="stopBtn" style="display:none;">Stop</button>
        </div>

        <div class="status" id="status">Click the orb or button to start</div>

        <div class="transcript" id="transcript"></div>
    </div>

    <script>
        let recognition;
        let isListening = false;
        let apiKey = '';
        
        const orb = document.getElementById('orb');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const status = document.getElementById('status');
        const transcript = document.getElementById('transcript');
        const apiKeyInput = document.getElementById('apiKey');

        // Initialize Speech Recognition
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onstart = () => {
                isListening = true;
                orb.classList.add('listening');
                status.textContent = 'Listening...';
                startBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';
            };

            recognition.onresult = async (event) => {
                const lastResult = event.results[event.results.length - 1];
                const text = lastResult[0].transcript;
                
                addToTranscript('You', text);
                status.textContent = 'Processing...';
                
                await sendToChatGPT(text);
            };

            recognition.onerror = (event) => {
                status.textContent = 'Error: ' + event.error;
                stopListening();
            };

            recognition.onend = () => {
                if (isListening) {
                    recognition.start();
                }
            };
        } else {
            status.innerHTML = '<span class="warning">Speech recognition not supported in this browser</span>';
        }

        // Speech Synthesis
        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.9;
            utterance.pitch = 1.1;
            utterance.volume = 1;
            
            utterance.onstart = () => {
                status.textContent = 'Drishti is speaking...';
            };
            
            utterance.onend = () => {
                status.textContent = 'Listening...';
            };
            
            speechSynthesis.speak(utterance);
        }

        // ChatGPT Integration
        async function sendToChatGPT(text) {
            apiKey = apiKeyInput.value.trim();
            
            if (!apiKey) {
                const response = "Please enter your OpenAI API key first.";
                addToTranscript('Drishti', response);
                speak(response);
                return;
            }

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'gpt-3.5-turbo',
                        messages: [
                            {
                                role: 'system',
                                content: 'You are Drishti, a helpful and friendly voice assistant. Keep responses concise and conversational.'
                            },
                            {
                                role: 'user',
                                content: text
                            }
                        ],
                        max_tokens: 150,
                        temperature: 0.7
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error.message);
                }
                
                const reply = data.choices[0].message.content;
                addToTranscript('Drishti', reply);
                speak(reply);
                
            } catch (error) {
                const errorMsg = 'Sorry, I encountered an error: ' + error.message;
                addToTranscript('Drishti', errorMsg);
                status.textContent = errorMsg;
            }
        }

        function addToTranscript(speaker, text) {
            const item = document.createElement('div');
            item.className = 'transcript-item';
            item.innerHTML = `
                <div class="user-text">${speaker}:</div>
                <div class="assistant-text">${text}</div>
            `;
            transcript.appendChild(item);
            transcript.scrollTop = transcript.scrollHeight;
        }

        function startListening() {
            if (recognition && !isListening) {
                recognition.start();
            }
        }

        function stopListening() {
            if (recognition && isListening) {
                isListening = false;
                recognition.stop();
                orb.classList.remove('listening');
                status.textContent = 'Stopped';
                startBtn.style.display = 'inline-block';
                stopBtn.style.display = 'none';
            }
        }

        orb.addEventListener('click', () => {
            if (isListening) {
                stopListening();
            } else {
                startListening();
            }
        });

        startBtn.addEventListener('click', startListening);
        stopBtn.addEventListener('click', stopListening);

        // Save API key to memory
        apiKeyInput.addEventListener('change', () => {
            apiKey = apiKeyInput.value.trim();
        });
    </script>
</body>
</html>
